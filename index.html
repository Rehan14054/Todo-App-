<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Login</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="m-0 p-0 box-border font-sans">
    <!-- SCREEN 1: Login -->
    <div
      id="login-screen"
      class="w-full text-center flex flex-col justify-center items-center h-screen"
    >
      <div class="w-[400px]">
        <h2 class="mb-6 text-2xl font-semibold">Login</h2>
        <form id="login-Form">
          <div class="mb-5 text-left">
            <input
              type="email"
              id="email"
              placeholder=" Email"
              required
              class="w-full h-[50px] border border-[#e8e8e8] rounded-lg px-3 focus:outline-none focus:border-[#a8aca8] focus:bg-[#f0f8ff] bg-[#f6f6f6]"
            />
          </div>

          <div class="mb-5 text-left relative">
            <input
              type="password"
              id="password"
              placeholder=" Password"
              autocomplete="new-password"
              required
              class="w-full h-[50px] border border-[#e8e8e8] rounded-lg px-3 focus:outline-none focus:border-[#a8aca8] focus:bg-[#f0f8ff] bg-[#f6f6f6]"
            />
            <span
              id="togglePassword"
              class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-sm text-black select-none hidden"
              >Show</span
            >
          </div>

          <button
            type="submit"
            class="w-full py-3 rounded-full bg-black text-white border-none mt-2 cursor-pointer hover:bg-[#292929] transition-colors"
          >
            Login
          </button>
        </form>
      </div>
    </div>

    <!-- SCREEN 2: Task Screen -->
    <div id="task-screen" class="hidden w-full h-screen flex">
      <!-- SIDEBAR -->
      <div class="sidebar w-24 md:w-72 flex items-center flex-col">
        <button
          class="mt-10 bg-black text-white font-medium w-full flex items-center justify-center gap-3 px-3 py-3 rounded-r-full"
        >
          <span class="hidden md:block shrink-0">
            <img
              src="assets/assignment_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg"
              alt=""
              class="w-6 h-6"
            />
          </span>
          <span>Task</span>
        </button>

        <button
          id="go-to-location"
          class="mt-4 text-black font-medium w-full flex items-center gap-3 px-3 py-2"
        >
          <span class="hidden md:block shrink-0">
            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
              <path
                d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"
              />
            </svg>
          </span>
          <span>Location</span>
        </button>

        <button
          id="logout-btn"
          class="mt-auto mb-10 text-black font-medium w-full flex gap-3 px-3 py-1"
        >
          <span class="hidden md:block shrink-0">
            <span class="material-symbols-outlined">logout</span>
          </span>
          <span>Logout</span>
        </button>
      </div>

      <!-- CONTENT AREA -->
      <div
        class="content-area flex-1 mt-12 flex flex-col px-10 overflow-y-auto"
      >
        <div class="flex justify-start mb-6">
          <button id="add-task-btn" class="text-lg font-bold">
            + Add new task
          </button>
        </div>

        <p class="text-lg font-bold mb-4">Incomplete</p>
        <ul id="incomplete-list" class="flex flex-col gap-4 mb-8"></ul>

        <p class="text-lg font-bold mb-4">Completed</p>
        <ul id="completed-list" class="flex flex-col gap-4"></ul>
      </div>
    </div>

    <!-- Screen 3: Location screen -->
    <div id="location-screen" class="hidden w-full h-screen flex">
      <!-- SIDEBAR -->
      <div class="sidebar w-24 md:w-72 flex items-start flex-col">
        <div class="flex justify-start">
          <button
            id="go-to-task"
            class="mt-4 text-black font-medium inline-flex items-center gap-3 px-3 py-3 cursor-pointer hover:bg-gray-100"
          >
            <span class="hidden md:block shrink-0">
              <img
                src="assets/assignment_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg"
                alt=""
                class="w-6 h-6 invert"
              />
            </span>

            <span>Task</span>
          </button>
        </div>

        <button
          class="mt-10 bg-black text-white font-medium w-full flex items-center gap-3 px-3 py-3 rounded-r-full"
        >
          <span class="hidden md:block shrink-0">
            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
              <path
                d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"
              />
            </svg>
          </span>
          <span>Location</span>
        </button>

        <button
          id="location-logout-btn"
          class="mt-auto mb-10 text-black font-medium w-full flex gap-3 px-3 py-1"
        >
          <span class="hidden md:block shrink-0">
            <span class="material-symbols-outlined">logout</span>
          </span>
          <span>Logout</span>
        </button>
      </div>

      <!-- CONTENT AREA of location -->
      <div
        class="content-area flex-1 mt-12 flex flex-col px-10 overflow-y-auto"
      >
        <div class="flex justify-start mb-6">
          <button id="check-in-btn" class="text-lg font-bold">
            + Check In
          </button>
        </div>

        <p class="text-lg font-bold mb-4">Current Location</p>
        <ul id="current-locations" class="flex flex-col gap-4 mb-8"></ul>

        <p class="text-lg font-bold mb-4">Previous Location</p>
        <ul id="previous-locations" class="flex flex-col gap-4"></ul>
      </div>
    </div>

    <!-- LOCATION MODAL -->
    <div
      id="location-modal"
      class="hidden fixed inset-0 bg-black/30 flex justify-center items-center"
    >
      <div class="bg-white rounded-2xl p-6 w-[400px] flex flex-col gap-4">
        <h2 class="text-lg font-semibold">New Location</h2>

        <input
          id="location-name"
          type="text"
          placeholder="Location name (e.g. Stockholm, SE)"
          class="border-b border-gray-200 py-2 text-sm focus:outline-none"
        />

        <input
          id="location-coords"
          type="text"
          placeholder="Coordinates (e.g. 59.323°N, 18.068°E)"
          class="border-b border-gray-200 py-2 text-sm focus:outline-none"
        />

        <button
          id="save-location-btn"
          class="w-full py-3 bg-black text-white rounded-full text-sm mt-2"
        >
          Save
        </button>

        <button id="cancel-location-btn" class="text-sm text-gray-500">
          Cancel
        </button>
      </div>
    </div>

    <!-- MODAL add new task-->
    <div
      id="task-modal"
      class="hidden fixed inset-0 bg-black/30 flex justify-center items-start pt-20 h-full"
    >
      <div
        class="bg-white rounded-2xl p-6 w-[90vw] max-w-[950px] flex flex-col gap-4 h-[70vh]"
      >
        <h2 class="text-lg font-semibold">New Task</h2>

        <div class="flex flex-col gap-5 ml-8">
          <span class="flex items-center gap-3">
            <span class="material-symbols-outlined">article_shortcut</span>
            <input
              id="task-summary"
              type="text"
              placeholder="Summary"
              class="flex-1 text-xl focus:outline-none"
            />
          </span>
          <hr class="mt-4 border-gray-400" />

          <span class="flex items-center gap-3">
            <span class="material-symbols-outlined">description</span>
            <input
              id="task-description"
              type="text"
              placeholder="description"
              class="flex-1 text-xl focus:outline-none"
            />
          </span>
          <hr class="mt-12 border-gray-400" />

          <span class="flex items-center gap-3">
            <span class="material-symbols-outlined">schedule</span>
            <input
              id="task-date"
              type="datetime-local"
              class="flex-1 text-xl focus:outline-none"
            />
          </span>
          <hr class="mt-4 border-gray-400" />
        </div>

        <div class="w-full flex flex-col items-center gap-3">
          <button
            id="save-task-btn"
            class="w-full max-w-[375px] py-3 bg-black text-white font-medium rounded-full mt-2 hover:bg-[#292929]"
          >
            Save
          </button>
          <button id="cancel-task-btn" class="text-black font-medium p-2">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- TOOLTIP BOX -->
    <div
      id="task-tooltip"
      class="hidden fixed top-4 right-4 bg-white shadow-lg rounded-2xl p-4 w-[300px] z-50"
    >
      <!-- top section → title + yellow clock icon -->
      <div class="flex items-start justify-between gap-3 mb-2">
        <!-- title + description -->
        <div>
          <p id="tooltip-summary" class="text-sm font-bold mb-1"></p>
          <p id="tooltip-description" class="text-xs text-gray-400"></p>
        </div>

        <!-- yellow clock icon -->
        <div class="bg-yellow-400 rounded-xl p-3 shrink-0">
          <svg
            class="w-5 h-5 text-white"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 
        10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 
        0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 
        8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"
            />
          </svg>
        </div>
      </div>

      <!-- reminder time input → hidden by default -->
      <div id="reminder-input" class="hidden mt-3 mb-2">
        <input
          id="reminder-time"
          type="datetime-local"
          class="w-full border border-gray-200 rounded-lg px-2 py-1 text-xs focus:outline-none mb-2"
        />
        <button
          id="set-reminder-btn"
          class="w-full py-2 bg-black text-white text-xs rounded-full"
        >
          Set Reminder
        </button>
      </div>

      <!-- bottom buttons → Skip | Remind me later -->
      <div class="flex justify-end items-center gap-4 mt-3">
        <button
          id="tooltip-skip"
          class="text-xs text-gray-500 hover:text-black"
        >
          Skip
        </button>
        <button
          id="tooltip-remind"
          class="text-xs text-gray-500 hover:text-black"
        >
          Remind me later
        </button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
